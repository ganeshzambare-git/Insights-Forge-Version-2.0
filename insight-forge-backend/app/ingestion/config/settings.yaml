thresholds:
  fuzzy_match: 75
  min_confidence_auto: 85
  min_confidence_review: 60
age:
  ug: [16, 25]
  pg: [20, 35]
  diploma: [15, 25]
  phd: [22, 50]
cgpa: {max: 10.0, cap: 10.5}
marks: {max: 100.0, cap: 105.0}
attendance: {max: 100.0, cap: 105.0}
semester: {flex: 2}
outliers: {contamination: 0.01}
dead_letter:
  critical_fields: [student_id, student_name, course]
review:
  issues: [unrecognized_course, unrecognized_branch, invalid_email, invalid_phone, age_out_of_range, cgpa_out_of_range, grade_out_of_range, attendance_out_of_range, semester_out_of_range, statistical_outlier, invalid_course_branch_combination]
course_aliases:
  B.Tech: [btech, b tech, b-tech, bachelor of technology]
  BCA: [bca, bachelor of computer application]
  BBA: [bba, bachelor of business administration]
  MBA: [mba, master of business administration]
  MCA: [mca, master of computer application]
branch_aliases:
  Computer Science Engineering: [cse, cs, comp sci, computer science, computer engineering, compsci]
  Information Technology: [it, info tech, information tech, infotech]
  Electronics & Communication Engineering: [ece, electronics, electronics comm]
  Electrical & Electronics Engineering: [eee, electrical, electrical electronics]
  Mechanical Engineering: [me, mechanical, mech, mech eng]
  Civil Engineering: [ce, civil, civil eng]
  Artificial Intelligence & Data Science: [ai ds, ai, data science, ai and ds, datascience]
  Biotechnology: [biotech, bio tech, bt]
  Chemical Engineering: [chemical, chem eng, che]
  Human Resources: [hr, hrm, human resource management]
  Computer Applications: [comp app, ca, computer apps]
